<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#080a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DailyOps">
  <title>Daily Operation System</title>
  
  <link rel="manifest" href="manifest.json" crossorigin="use-credentials">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="apple-touch-icon" href="icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #080a0f;
      --bg2:       #0f1219;
      --bg3:       #161b26;
      --border:    #1e2535;
      --amber:     #f59e0b;
      --amber-dim: #92610a;
      --green:     #10b981;
      --red:       #ef4444;
      --text:      #e2e8f0;
      --text-dim:  #64748b;
      --text-mid:  #94a3b8;
      --radius:    12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(245,158,11,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,158,11,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(245,158,11,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 16px 40px; }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0 16px;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--amber);
    }
    .logo span { color: var(--text-dim); font-size: 14px; letter-spacing: 1px; display: block; font-family: 'DM Mono', monospace; margin-top: -4px; }
    .header-actions { display: flex; gap: 10px; align-items: center; }
    .icon-btn {
      width: 36px; height: 36px;
      border: 1px solid var(--border);
      background: var(--bg2);
      border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-dim);
      transition: all 0.2s;
      font-size: 16px;
    }
    .icon-btn:hover { border-color: var(--amber); color: var(--amber); }

    .status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 20px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
    }
    .status-dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse-dot 2s infinite; }
    .status-dot.amber { background: var(--amber); box-shadow: 0 0 6px var(--amber); animation: pulse-dot 2s infinite; }
    .status-dot.red   { background: var(--red); }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status-bar .date {
      margin-left: auto;
      color: var(--text-mid);
    }

    .system-badge {
      background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }
    .system-badge::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--amber), transparent);
    }
    .system-badge .sys-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 72px;
      line-height: 1;
      color: var(--amber);
      opacity: 0.15;
      position: absolute;
      right: 16px; top: 10px;
    }
    .system-badge .sys-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--amber);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .system-badge .sys-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 1px;
      line-height: 1.1;
      margin-bottom: 8px;
    }
    .system-badge .sys-desc {
      font-size: 12px;
      color: var(--text-mid);
      line-height: 1.5;
    }

    .current-block {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--green);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 16px;
      position: relative;
    }
    .current-block .cb-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--green);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .current-block .cb-content {
      display: flex; align-items: flex-start; gap: 12px;
    }
    .current-block .cb-emoji { font-size: 24px; flex-shrink: 0; margin-top: 2px; }
    .current-block .cb-text .cb-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      line-height: 1;
      margin-bottom: 4px;
    }
    .current-block .cb-text .cb-desc {
      font-size: 12px;
      color: var(--text-mid);
      line-height: 1.5;
    }
    .current-block .cb-next {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
    }
    .current-block .cb-next strong { color: var(--amber); }

    .timeline-header {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 12px;
      padding: 0 4px;
    }
    .timeline { display: flex; flex-direction: column; gap: 4px; margin-bottom: 20px; }
    .block-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: all 0.3s;
      cursor: default;
    }
    .block-item.active {
      border-color: var(--green);
      background: rgba(16,185,129,0.06);
    }
    .block-item.done {
      opacity: 0.4;
    }
    .block-item .bi-time {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      color: var(--text-dim);
      min-width: 48px;
      letter-spacing: 1px;
    }
    .block-item.active .bi-time { color: var(--green); }
    .block-item.upcoming .bi-time { color: var(--text-mid); }
    .block-item .bi-emoji { font-size: 18px; }
    .block-item .bi-info { flex: 1; }
    .block-item .bi-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.2;
    }
    .block-item .bi-desc {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.4;
      margin-top: 1px;
    }
    .block-item .bi-tag {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(245,158,11,0.1);
      color: var(--amber);
      letter-spacing: 1px;
    }
    .block-item.active .bi-tag {
      background: rgba(16,185,129,0.15);
      color: var(--green);
    }

    .notif-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 14px;
    }
    .notif-icon { font-size: 24px; flex-shrink: 0; }
    .notif-text { flex: 1; }
    .notif-text h4 { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .notif-text p { font-size: 11px; color: var(--text-dim); }
    .btn-sm {
      padding: 8px 14px;
      border-radius: 6px;
      border: 1px solid var(--amber);
      background: transparent;
      color: var(--amber);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .btn-sm:hover { background: var(--amber); color: var(--bg); }
    .btn-sm.granted { border-color: var(--green); color: var(--green); cursor: default; }
    .btn-sm.granted:hover { background: transparent; }

    #setup-screen {
      padding: 20px 0;
    }
    .setup-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 2px;
      line-height: 1;
      margin-bottom: 8px;
    }
    .setup-title span { color: var(--amber); }
    .setup-sub {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .setup-step {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }
    .setup-step-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--amber);
      margin-bottom: 4px;
    }
    .setup-step h4 { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .setup-step p { font-size: 12px; color: var(--text-dim); line-height: 1.6; }
    .setup-step a { color: var(--amber); text-decoration: none; }
    .setup-step a:hover { text-decoration: underline; }
    .setup-step code {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--amber);
    }
    .setup-input-wrap { margin-top: 10px; }
    .setup-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }
    .setup-input:focus { border-color: var(--amber); }
    .setup-input::placeholder { color: var(--text-dim); }
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--amber);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 20px;
    }
    .btn-primary:hover { background: #fbbf24; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    #auth-screen { padding: 40px 0; text-align: center; }
    .auth-icon { font-size: 48px; margin-bottom: 20px; }

      font-size: 32px;
      letter-spacing:
